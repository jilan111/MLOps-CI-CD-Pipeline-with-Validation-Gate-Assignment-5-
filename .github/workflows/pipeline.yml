name: Model Validation and Deployment Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Model
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn dvc
      
      - name: Pull data with DVC
        run: |
          if [ -f dvc.yaml ]; then
            dvc pull || echo "No remote DVC setup, skipping..."
          else
            echo "No dvc.yaml found, skipping DVC pull"
          fi
      
      - name: Train model
        run: |
          python train.py
      
      - name: Verify model_info.txt was created
        run: |
          if [ ! -f model_info.txt ]; then
            echo "ERROR: model_info.txt was not created"
            exit 1
          fi
          echo "Run ID: $(cat model_info.txt)"
      
      - name: Upload model info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            model_info.txt
            mlruns/
  
  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn
      
      - name: Download model info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: .
      
      - name: Debug - Check directory structure
        run: |
          echo "=== Current Directory ==="
          pwd
          echo ""
          echo "=== Files in Current Directory ==="
          ls -la
          echo ""
          echo "=== Directory Tree (3 levels) ==="
          find . -maxdepth 3 -type d | sort
          echo ""
          echo "=== All Files Recursively (3 levels) ==="
          find . -maxdepth 3 -type f | sort
          echo ""
          echo "=== Checking for model_info.txt ==="
          if [ -f model_info.txt ]; then
            echo "✓ model_info.txt found in current directory"
            echo "  Content: $(cat model_info.txt)"
          else
            echo "✗ model_info.txt NOT found in current directory"
          fi
          echo ""
          echo "=== Checking for mlruns directory ==="
          if [ -d mlruns ]; then
            echo "✓ mlruns directory found"
            find mlruns -maxdepth 2 -type f | head -10
          else
            echo "✗ mlruns directory NOT found"
          fi
      
      - name: Check accuracy threshold
        run: |
          python check_threshold.py
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image (Mock Deployment)
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          docker build --build-arg RUN_ID="$RUN_ID" -t model-deployment:$RUN_ID .
          
          # Run the docker image to verify deployment
          docker run --rm model-deployment:$RUN_ID
