name: Model Validation and Deployment Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Model
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn dvc
      
      - name: Pull data with DVC
        run: |
          if [ -f dvc.yaml ]; then
            dvc pull || echo "No remote DVC setup, skipping..."
          else
            echo "No dvc.yaml found, skipping DVC pull"
          fi
      
      - name: Train model
        run: |
          python train.py
      
      - name: Verify model_info.txt was created
        run: |
          if [ ! -f model_info.txt ]; then
            echo "ERROR: model_info.txt was not created"
            exit 1
          fi
          echo "Run ID: $(cat model_info.txt)"
      
      - name: Upload model info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
      
      - name: Upload mlruns artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-artifact
          path: mlruns/
  
  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn
      
      - name: Download model info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .
      
      - name: Download mlruns artifact
        uses: actions/download-artifact@v4
        with:
          name: mlruns-artifact
          path: .
      
      - name: Debug - Check directory structure
        run: |
          echo "=== pwd ==="
          pwd
          echo ""
          echo "=== ls -la ==="
          ls -la
          echo ""
          echo "=== find . -maxdepth 5 -type d ==="
          find . -maxdepth 5 -type d | sort
          echo ""
          echo "=== find . -maxdepth 5 -type f ==="
          find . -maxdepth 5 -type f | sort
      
      - name: Normalize artifacts
        run: |
          echo "=== Normalizing downloaded artifacts ==="
          
          # Handle nested mlruns directory
          if [ -d "mlruns-artifact" ]; then
            echo "Found nested mlruns-artifact folder, moving to mlruns..."
            if [ -d "mlruns" ]; then
              rm -rf mlruns
            fi
            mv mlruns-artifact mlruns
            echo "✓ mlruns directory normalized"
          elif [ -d "mlruns" ]; then
            echo "✓ mlruns directory already in correct location"
          else
            echo "✗ WARNING: No mlruns directory found"
          fi
          
          # Handle nested model_info.txt
          if [ -f "model_info.txt" ]; then
            echo "✓ model_info.txt already in correct location"
          elif [ -f "model-info/model_info.txt" ]; then
            echo "Found nested model_info.txt, copying to current directory..."
            cp model-info/model_info.txt .
            echo "✓ model_info.txt copied to current directory"
          else
            echo "✗ WARNING: model_info.txt not found in expected locations"
          fi
          
          # Verify final state
          echo ""
          echo "=== Verification ==="
          if [ -f "model_info.txt" ]; then
            echo "✓ model_info.txt exists"
            echo "  Content: $(cat model_info.txt)"
          fi
          if [ -d "mlruns" ]; then
            echo "✓ mlruns directory exists"
            ls -la mlruns/ | head -5
          fi
      
      - name: Check accuracy threshold
        run: |
          python check_threshold.py
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image (Mock Deployment)
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          docker build --build-arg RUN_ID="$RUN_ID" -t model-deployment:$RUN_ID .
          
          # Run the docker image to verify deployment
          docker run --rm model-deployment:$RUN_ID
