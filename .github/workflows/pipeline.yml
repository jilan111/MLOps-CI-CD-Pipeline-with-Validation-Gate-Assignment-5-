name: Model Validation and Deployment Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Model
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn dvc
      
      - name: Pull data with DVC
        run: |
          if [ -f dvc.yaml ]; then
            dvc pull || echo "No remote DVC setup, skipping..."
          else
            echo "No dvc.yaml found, skipping DVC pull"
          fi
      
      - name: Train model
        run: |
          python train.py
      
      - name: Archive MLflow local store
        run: |
          tar -czf mlruns.tar.gz mlruns
      
      - name: Verify model_info.txt was created
        run: |
          if [ ! -f model_info.txt ]; then
            echo "ERROR: model_info.txt was not created"
            exit 1
          fi
          echo "Run ID: $(cat model_info.txt)"
      
      - name: Upload model info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
      
      - name: Upload mlruns archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-archive
          path: mlruns.tar.gz
  
  deploy:
    name: Deploy Model
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn
      
      - name: Download model info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .
      
      - name: Download mlruns archive artifact
        uses: actions/download-artifact@v4
        with:
          name: mlruns-archive
          path: .
      
      - name: Extract MLflow local store archive
        run: |
          tar -xzf mlruns.tar.gz
      
      - name: Debug - Check directory structure before threshold check
        run: |
          pwd
          ls -la
          find . -maxdepth 5 -type d | sort
          find . -maxdepth 5 -type f | sort
      
      - name: Normalize artifacts
        run: |
          echo "=== Verifying artifact structure ==="
          
          # Verify model_info.txt exists
          if [ -f "model_info.txt" ]; then
            echo "✓ model_info.txt is in correct location"
            echo "  Content: $(cat model_info.txt)"
          else
            echo "✗ ERROR: model_info.txt not found"
            exit 1
          fi
          
          # Verify mlruns directory exists
          if [ -d "mlruns" ]; then
            echo "✓ mlruns directory is in correct location"
            echo "  Contents:"
            ls -la mlruns/ | head -5
          else
            echo "✗ ERROR: mlruns directory not found"
            exit 1
          fi
      
      - name: Check accuracy threshold
        run: |
          python check_threshold.py
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image (Mock Deployment)
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"
          docker build --build-arg RUN_ID="$RUN_ID" -t model-deployment:$RUN_ID .
          
          # Run the docker image to verify deployment
          docker run --rm model-deployment:$RUN_ID
